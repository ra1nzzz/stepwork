# STEPWORK CI Pipeline
#
# 触发策略：push 到 main + 所有 PR
# 并发控制：同一分支的新 push 取消旧 run
#
# 三个独立 job：
#   - rust-check  ：apps/desktop/src-tauri 的 cargo check/clippy/fmt/test
#   - frontend-check：apps/desktop 的 tsc --noEmit + 生产构建
#   - python-check ：worker 的 ruff / mypy / pytest（从仓库根 pyproject.toml 安装 -e .[dev]）
#
# 注：cargo *不* 执行 `tauri build`，仅 check/test，故无需 WebView2 运行时，
# 在 windows-latest 上可直接通过。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check (Tauri Host)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo test
        run: cargo test --all-targets

  frontend-check:
    name: Frontend Check (React + TS)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (app)
        run: npx tsc --noEmit -p tsconfig.json

      - name: TypeScript check (node config)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Build
        run: npm run build

  python-check:
    name: Python Check (Worker)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: '~\AppData\Local\pip\Cache'
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: worker
        run: ruff check .

      - name: Type check (mypy)
        working-directory: worker
        run: mypy .

      - name: Pytest
        working-directory: worker
        run: pytest tests -q
