<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>项目 · STEPWORK</title><link rel="stylesheet" href="styles.css"></head><body><div class="app-shell"><aside class="sidebar"><a class="brand" href="index.html"><span class="brand-mark"></span>STEPWORK</a><p class="nav-label">内容工作区</p><nav class="nav" aria-label="主导航"><a class="nav-item" href="index.html"><span class="nav-icon">01</span>首页</a><a class="nav-item active" href="projects.html"><span class="nav-icon">02</span>项目</a><a class="nav-item" href="inspector.html"><span class="nav-icon">03</span>创作</a><a class="nav-item" href="tasks.html"><span class="nav-icon">04</span>任务</a><a class="nav-item" href="settings.html"><span class="nav-icon">05</span>设置</a></nav></aside><div class="workspace"><header class="topbar"><div class="crumbs"><strong>项目</strong></div><div class="top-actions"><button class="btn ghost" type="button" id="importProject">导入项目</button><button class="btn primary" type="button" id="newProject">新建项目</button></div></header><main class="content"><section class="page-head"><div><p class="eyebrow">PROJECT LIBRARY</p><h1>项目与内容版本</h1><p class="page-subtitle">搜索、筛选、归档和导入导出完整项目，保留素材与 Artifact 依赖。</p></div><span class="status success">4 个进行中</span></section><section class="panel"><div class="panel-head"><div class="searchbar"><input class="field" id="projectSearch" type="search" placeholder="搜索项目、标签或来源"><select class="select" id="projectFilter"><option value="all">全部状态</option><option value="active">进行中</option><option value="review">待确认</option><option value="archived">已归档</option></select></div><button class="btn small ghost" type="button" id="exportProject">导出选中项目</button></div><div class="table-wrap"><table class="product-table"><thead><tr><th>项目</th><th>当前阶段</th><th>来源</th><th>最近更新</th><th>操作</th></tr></thead><tbody id="projectRows"><tr data-state="review"><td><strong>AI 眼镜通勤实测</strong><div class="row-sub">科技实测 · 竖屏视频</div></td><td><span class="status warning">待审脚本</span></td><td>2 个素材</td><td class="mono">刚刚</td><td><a class="btn small" href="studio.html">继续</a> <button class="btn small ghost archive" type="button">归档</button></td></tr><tr data-state="review"><td><strong>县城咖啡店的 AI 生意</strong><div class="row-sub">商业观察 · 口播</div></td><td><span class="status ai">待选角度</span></td><td>3 个素材</td><td class="mono">18 分钟前</td><td><a class="btn small" href="radar.html">继续</a> <button class="btn small ghost archive" type="button">归档</button></td></tr><tr data-state="active"><td><strong>无屏幕周末观察</strong><div class="row-sub">生活方式 · 竖屏视频</div></td><td><span class="status success">渲染中</span></td><td>4 个素材</td><td class="mono">1 小时前</td><td><a class="btn small" href="render.html">查看</a> <button class="btn small ghost archive" type="button">归档</button></td></tr><tr data-state="archived"><td><strong>低空经济城市体验</strong><div class="row-sub">商业观察 · 已归档</div></td><td><span class="status">已归档</span></td><td>1 个素材</td><td class="mono">7 月 12 日</td><td><button class="btn small restore" type="button">恢复</button></td></tr></tbody></table></div></section></main></div></div><div class="toast" role="status" aria-live="polite" data-toast></div><script src="app.js"></script><script>(()=>{const search=document.getElementById('projectSearch'),filter=document.getElementById('projectFilter'),rows=[...document.querySelectorAll('#projectRows tr')];function apply(){const q=search.value.trim().toLowerCase();rows.forEach(row=>row.hidden=(!row.innerText.toLowerCase().includes(q))||(filter.value!=='all'&&row.dataset.state!==filter.value))}search.addEventListener('input',apply);filter.addEventListener('change',apply);document.querySelectorAll('.archive').forEach(b=>b.addEventListener('click',()=>{b.closest('tr').dataset.state='archived';b.closest('tr').querySelector('.status').className='status';b.closest('tr').querySelector('.status').textContent='已归档';showToast('项目已归档')}));document.querySelector('.restore').addEventListener('click',e=>{e.currentTarget.closest('tr').dataset.state='active';e.currentTarget.closest('tr').querySelector('.status').className='status success';e.currentTarget.closest('tr').querySelector('.status').textContent='已恢复';showToast('项目已恢复')});document.getElementById('newProject').addEventListener('click',()=>location.href='inspector.html');document.getElementById('importProject').addEventListener('click',()=>showToast('请选择 STEPWORK 项目包进行导入'));document.getElementById('exportProject').addEventListener('click',()=>showToast('项目包已开始生成，包含来源与版本记录'));})();</script></body></html>
